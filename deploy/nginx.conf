# /etc/nginx/sites-available/travirt
# Symlink: ln -s /etc/nginx/sites-available/travirt /etc/nginx/sites-enabled/travirt
# Test: nginx -t && systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://yourdomain.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # --- TLS (managed by Certbot) -------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers (Fastify/helmet also sets these, belt-and-suspenders)
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # --- Gzip -----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # --- Frontend static files -----------------------------------------------
    root /var/www/travirt/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Immutable cache for hashed assets (Vite adds content hash to filenames)
        location ~* \.(js|css|woff2?|ttf|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- Backend API ----------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Remove Upgrade header for regular API requests
        proxy_set_header   Upgrade    "";
        proxy_set_header   Connection "";
    }

    # --- WebSocket market feed -----------------------------------------------
    location /ws {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # --- Health check (allow monitoring without auth) -------------------------
    location /health {
        proxy_pass         http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # --- Block sensitive files ------------------------------------------------
    location ~ /\. {
        deny all;
    }
}
